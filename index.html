<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Crackus By SlimTrix</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000;
  --bg2:#0a0a0a;
  --bg3:#111;
  --bg4:#1a1a1a;
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.12);
  --green:#22c55e;
  --green-dim:rgba(34,197,94,0.15);
  --green-glow:rgba(34,197,94,0.3);
  --text:#f0f0f0;
  --text2:#a0a0a0;
  --text3:#606060;
  --blue:#3b82f6;
  --blue-dim:rgba(59,130,246,0.2);
  --radius:16px;
  --font:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

/* LAYOUT */
#app{display:flex;height:100vh;position:relative}

/* SIDEBAR */
#sidebar{width:260px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:20}
#sidebar.hidden{transform:translateX(-100%);position:absolute;height:100%}
.sidebar-top{padding:18px 16px 12px;border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.brand-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#000;box-shadow:0 4px 12px rgba(34,197,94,0.35)}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.brand-sub{font-size:10px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase}
.new-chat-btn{width:100%;padding:9px 14px;background:var(--green-dim);border:1px solid rgba(34,197,94,0.25);border-radius:10px;color:var(--green);font-size:13px;font-family:var(--font);display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .2s}
.new-chat-btn:hover{background:rgba(34,197,94,0.22);border-color:rgba(34,197,94,0.4)}
.sidebar-section{padding:16px 16px 8px}
.sidebar-section-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px;padding-left:4px}
.sidebar-item{padding:8px 10px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:8px}
.sidebar-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.active-chat{background:rgba(34,197,94,0.08)!important;color:var(--text)!important;border-left:2px solid var(--green);padding-left:8px!important}
.sidebar-item i{font-size:12px;color:var(--text3)}
.sidebar-bottom{margin-top:auto;padding:14px 16px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:10px}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.user-info p{font-size:13px;font-weight:500}
.user-info span{font-size:11px;color:var(--text3)}
.status-dot{margin-left:auto;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green-glow);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

/* HEADER */
#header{position:sticky;top:0;z-index:10;padding:12px 20px;display:flex;align-items:center;gap:14px;background:rgba(0,0,0,0.7);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border)}
.menu-btn{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:6px;border-radius:8px;transition:all .15s;line-height:1}
.menu-btn:hover{background:rgba(255,255,255,0.06);color:var(--text)}

/* MODEL SELECTOR */
#model-wrap{position:relative}
#model-btn{display:flex;align-items:center;gap:8px;padding:7px 13px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:13px;font-family:var(--font);cursor:pointer;transition:all .2s}
#model-btn:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.18)}
.model-indicator{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green-glow);animation:pulse-dot 2s infinite}
#model-dropdown{position:absolute;top:calc(100% + 8px);left:0;min-width:260px;background:rgba(10,10,10,0.95);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--border2);border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.8),0 0 0 1px rgba(255,255,255,0.04);z-index:200;display:none;animation:dropIn .18s cubic-bezier(.4,0,.2,1)}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.model-dropdown-header{padding:10px 14px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.model-opt{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .12s}
.model-opt:hover{background:rgba(255,255,255,0.05)}
.model-opt.active{background:rgba(34,197,94,0.08)}
.model-opt-left{display:flex;flex-direction:column;gap:2px}
.model-opt-name{font-size:13.5px;font-weight:500}
.model-opt-desc{font-size:11px;color:var(--text3)}
.model-opt-badge{font-size:10px;padding:2px 8px;border-radius:20px}
.badge-green{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.badge-blue{background:rgba(59,130,246,0.12);color:#60a5fa;border:1px solid rgba(59,130,246,0.2)}
.badge-purple{background:rgba(168,85,247,0.12);color:#c084fc;border:1px solid rgba(168,85,247,0.2)}
.badge-orange{background:rgba(249,115,22,0.12);color:#fb923c;border:1px solid rgba(249,115,22,0.2)}
.model-check{color:var(--green);font-size:13px;visibility:hidden}
.model-opt.active .model-check{visibility:visible}
#model-dropdown::before{display:none}

/* MESSAGES AREA */
#messages{flex:1;overflow-y:auto;padding:24px 20px 20px;display:flex;flex-direction:column;gap:0}
.msgs-inner{max-width:900px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:6px}

/* WELCOME */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;flex:1;padding:40px 20px;animation:fadeUp .5s ease}
.welcome-icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#000;margin:0 auto 20px;box-shadow:0 8px 28px rgba(34,197,94,0.35)}
.welcome-title{font-size:26px;font-weight:700;margin-bottom:8px;letter-spacing:-.5px}
.welcome-sub{font-size:15px;color:var(--text2);margin-bottom:32px;max-width:460px;line-height:1.6}
.starter-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:560px;width:100%}
.starter-card{padding:14px 16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;cursor:pointer;text-align:left;transition:all .2s;color:var(--text2);font-size:13px;line-height:1.4}
.starter-card:hover{background:rgba(34,197,94,0.06);border-color:rgba(34,197,94,0.25);color:var(--text)}
.starter-card strong{display:block;color:var(--text);font-size:13px;margin-bottom:3px;font-weight:500}

/* MESSAGES */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-row{display:flex;gap:12px;padding:10px 0;animation:fadeUp .3s ease forwards;opacity:0}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar-wrap{flex-shrink:0;padding-top:2px}
.msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.msg-av.ai{background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;box-shadow:0 2px 10px rgba(34,197,94,0.3)}
.msg-av.user{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;box-shadow:0 2px 10px rgba(59,130,246,0.3)}
.msg-body{flex:1;min-width:0}
.msg-name{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.msg-row.user .msg-name{justify-content:flex-end}
.msg-bubble{display:inline-block;max-width:82%;padding:12px 16px;border-radius:16px;font-size:14.5px;line-height:1.7;word-break:break-word}
.msg-row.ai .msg-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:4px 16px 16px 16px;color:var(--text)}
.msg-row.user .msg-bubble{background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(99,102,241,0.2));border:1px solid rgba(59,130,246,0.25);border-radius:16px 4px 16px 16px;color:var(--text);float:right}
.msg-row.user .msg-body{display:flex;flex-direction:column;align-items:flex-end}
.msg-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.msg-row.user .msg-actions{justify-content:flex-end}
.action-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text3);font-size:11px;font-family:var(--font);cursor:pointer;transition:all .15s}
.action-btn:hover{background:rgba(255,255,255,0.07);color:var(--text);border-color:var(--border2)}
.action-btn i{font-size:10px}

/* CODE BLOCKS */
.code-wrap{margin:10px 0;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);background:#0d0d0d}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.07)}
.code-lang{font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:lowercase}
.copy-code-btn{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text3);font-size:11px;font-family:var(--font);cursor:pointer;transition:all .15s}
.copy-code-btn:hover{background:rgba(34,197,94,0.1);color:var(--green);border-color:rgba(34,197,94,0.3)}
.copy-code-btn.copied{color:var(--green);border-color:rgba(34,197,94,0.3)}
.code-block{margin:0;padding:16px;font-family:var(--mono);font-size:13px;line-height:1.6;overflow-x:auto;color:#e2e8f0;background:#0d0d0d;white-space:pre}

/* INLINE CODE */
.msg-bubble code:not(.code-block){background:rgba(255,255,255,0.08);padding:2px 6px;border-radius:5px;font-family:var(--mono);font-size:13px;color:#86efac}

/* TYPED CURSOR */
.cursor{display:inline-block;width:2px;height:1em;background:var(--green);margin-left:2px;vertical-align:text-bottom;animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* TYPING INDICATOR */
#typing-row{display:flex;gap:12px;padding:10px 0;animation:fadeUp .3s ease}
.typing-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:4px 16px 16px 16px;padding:14px 18px;display:flex;align-items:center;gap:5px}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);animation:bounce 1.2s infinite}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* INPUT AREA */
#input-area{padding:14px 20px 20px;flex-shrink:0;background:linear-gradient(to top,var(--bg) 60%,transparent)}
.input-wrap{max-width:900px;margin:0 auto}
.input-pill{display:flex;align-items:center;gap:10px;background:rgba(18,18,18,0.95);border:1px solid var(--border2);border-radius:20px;padding:10px 12px 10px 18px;backdrop-filter:blur(16px);box-shadow:0 4px 30px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.03);transition:border-color .2s}
.input-pill:focus-within{border-color:rgba(34,197,94,0.35);box-shadow:0 4px 30px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.03),0 0 20px rgba(34,197,94,0.08)}
#msg-ta{flex:1;background:transparent;border:none;outline:none;resize:none;font-family:var(--font);font-size:15px;color:var(--text);line-height:1.5;max-height:180px;overflow-y:auto;padding:4px 0}
#msg-ta::placeholder{color:var(--text3)}
#send-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);border:none;color:#000;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;box-shadow:0 4px 14px rgba(34,197,94,0.35)}
#send-btn:hover:not(:disabled){transform:scale(1.08);box-shadow:0 6px 20px rgba(34,197,94,0.5)}
#send-btn:active:not(:disabled){transform:scale(.95)}
#send-btn:disabled{background:rgba(255,255,255,0.07);color:var(--text3);box-shadow:none;cursor:default}
.input-footer{display:flex;align-items:center;justify-content:center;margin-top:8px;gap:6px;font-size:11px;color:var(--text3)}
.input-footer kbd{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:4px;padding:1px 5px;font-family:var(--font);font-size:10px}

/* MOBILE */
@media(max-width:640px){
  #sidebar{position:absolute;height:100%;transform:translateX(-100%)}
  #sidebar.open{transform:none}
  .starter-grid{grid-template-columns:1fr}
  .msg-bubble{max-width:95%}
}

/* ── ANIMATIONS ─────────────────────────────────────────────────────── */

/* Page load — slide in from left */
@keyframes sidebarIn{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
#sidebar{animation:sidebarIn .45s cubic-bezier(.4,0,.2,1) both}

/* Header fade down */
@keyframes headerIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
#header{animation:headerIn .4s .1s cubic-bezier(.4,0,.2,1) both}

/* Input bar rise */
@keyframes inputIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
#input-area{animation:inputIn .45s .2s cubic-bezier(.4,0,.2,1) both}

/* Welcome screen stagger */
.welcome-icon{animation:fadeUp .5s .15s cubic-bezier(.4,0,.2,1) both}
.welcome-title{animation:fadeUp .5s .25s cubic-bezier(.4,0,.2,1) both}
.welcome-sub{animation:fadeUp .5s .35s cubic-bezier(.4,0,.2,1) both}
.starter-grid{animation:fadeUp .5s .45s cubic-bezier(.4,0,.2,1) both}

/* Starter cards */
.starter-card{transition:all .22s cubic-bezier(.4,0,.2,1);transform:translateY(0)}
.starter-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(34,197,94,0.12)}
.starter-card:active{transform:translateY(0) scale(.98)}

/* Brand icon subtle float */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.brand-icon{animation:float 4s ease-in-out infinite}
.welcome-icon{animation:fadeUp .5s .15s cubic-bezier(.4,0,.2,1) both, float 5s 1s ease-in-out infinite}

/* Message bubbles — staggered pop in */
.msg-row{animation:msgIn .3s cubic-bezier(.34,1.4,.64,1) forwards;opacity:0}
@keyframes msgIn{
  0%{opacity:0;transform:translateY(10px) scale(.97)}
  60%{opacity:1}
  100%{opacity:1;transform:translateY(0) scale(1)}
}

/* User bubble has a slight right-slide */
.msg-row.user{animation:msgInUser .3s cubic-bezier(.34,1.4,.64,1) forwards;opacity:0}
@keyframes msgInUser{
  0%{opacity:0;transform:translateX(12px) scale(.97)}
  60%{opacity:1}
  100%{opacity:1;transform:translateX(0) scale(1)}
}

/* Avatar pulse on appear */
.msg-av{transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.msg-row:hover .msg-av{transform:scale(1.08)}

/* Action buttons fade in on hover — only for real msg rows, not typing */
.msg-row:not(#typing-row) .msg-actions{opacity:0;transform:translateY(3px);transition:opacity .18s ease,transform .18s ease}
.msg-row:not(#typing-row):hover .msg-actions{opacity:1;transform:translateY(0)}

/* Send button spin on click */
@keyframes sendPop{0%{transform:scale(1)}40%{transform:scale(.88) rotate(-10deg)}100%{transform:scale(1) rotate(0)}}
#send-btn:not(:disabled):active{animation:sendPop .25s cubic-bezier(.34,1.56,.64,1)}

/* New chat button */
.new-chat-btn{transition:all .2s cubic-bezier(.4,0,.2,1)}
.new-chat-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(34,197,94,0.2)}
.new-chat-btn:active{transform:translateY(0) scale(.97)}

/* Chat list items slide in */
@keyframes chatItemIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.chat-list-item{animation:chatItemIn .25s cubic-bezier(.4,0,.2,1) both}

/* Scroll button pulse when visible */
@keyframes scrollBtnIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}

/* Code block hover lift */
.code-wrap{transition:border-color .2s ease,box-shadow .2s ease}
.code-wrap:hover{border-color:rgba(255,255,255,0.18);box-shadow:0 4px 20px rgba(0,0,0,0.4)}

/* Copy button */
.copy-code-btn,.action-btn{transition:all .18s cubic-bezier(.4,0,.2,1)}
.copy-code-btn:active,.action-btn:active{transform:scale(.93)}

/* Model dropdown items */
.model-opt{transition:background .15s ease,padding-left .15s ease}
.model-opt:hover{padding-left:18px}
.model-opt.active{padding-left:18px}

/* Typing dots grow slightly */
.typing-dot{animation:bounceDot 1.3s cubic-bezier(.36,.07,.19,.97) infinite}
@keyframes bounceDot{0%,80%,100%{transform:scale(1) translateY(0);background:var(--text3)}40%{transform:scale(1.3) translateY(-5px);background:var(--green)}}

/* Input pill shadow breathe on focus */
.input-pill{transition:border-color .25s ease,box-shadow .35s ease}

/* Sidebar bottom user row */
.user-row{transition:opacity .2s}
.user-row:hover{opacity:.85}

/* Status dot ripple */
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 6px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
.status-dot{animation:pulse-dot 2s infinite,ripple 2.5s infinite}

</style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <div class="brand-icon">C</div>
        <div>
          <div class="brand-name">Crackus</div>
          <div class="brand-sub">By SlimTrix</div>
        </div>
      </div>
      <button class="new-chat-btn" onclick="newChat()">
        <i class="fa-solid fa-plus"></i> New Conversation
      </button>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto;min-height:0;display:flex;flex-direction:column">
      <div class="sidebar-section-label">Chats</div>
      <div id="chat-list"></div>
      <div id="no-chats" style="font-size:12px;color:var(--text3);padding:4px 4px">No chats yet</div>
    </div>
    <div class="sidebar-bottom">
      <div class="user-row">
        <div class="user-avatar">U</div>
        <div class="user-info">
          <p>User</p>
          <span>Groq API</span>
        </div>
        <div class="status-dot" title="Connected"></div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- HEADER -->
    <div id="header">
      <button class="menu-btn" onclick="toggleSidebar()" title="Toggle sidebar">
        <i class="fa-solid fa-bars"></i>
      </button>

      <!-- Model selector -->
      <div id="model-wrap">
        <button id="model-btn" onclick="toggleModelMenu(event)">
          <span class="model-indicator"></span>
          <span id="model-label">Llama 3.3 70B</span>
          <span id="model-badge" class="model-opt-badge badge-green">Versatile</span>
          <i class="fa-solid fa-chevron-down" id="chev" style="font-size:10px;color:var(--text3);transition:transform .2s"></i>
        </button>

        <div id="model-dropdown">
          <div class="model-dropdown-header">Select Model</div>
        </div>
      </div>

      <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
        <div style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px">
          <i class="fa-solid fa-circle" style="font-size:7px;color:var(--green)"></i>
          Connected
        </div>
      </div>

// ── CHAT HISTORY SYSTEM ──────────────────────────────────────────────

function saveChat(){

function renderChatList(){
  const list = document.getElementById("chat-list");

  [...chats].reverse().forEach((chat, idx)=>{

    d.style.cssText="justify-content:space-between;gap:6px;padding-right:6px";

    title.style.cssText="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:12.5px";
    title.textContent = chat.title;

function deleteChat(id){

function scrollBottom(smooth){

function escHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderContent(raw){
  // Split on code blocks
  const parts = raw.split(/(```[\s\S]*?```)/g);
  let html = "";
  parts.forEach(part => {
    if(part.startsWith("```")){
      const lines = part.slice(3,-3).split("\n");
      const lang = lines[0].trim() || "code";
      const code = lines.slice(1).join("\n");
      const id = "cb"+Math.random().toString(36).slice(2,8);
      html += `<div class="code-wrap">
        <div class="code-header">
          <span class="code-lang"><i class="fa-solid fa-terminal" style="margin-right:5px;font-size:10px"></i>${escHtml(lang)}</span>
          <button class="copy-code-btn" onclick="copyCode('${id}',this)"><i class="fa-regular fa-copy"></i> Copy</button>
        </div>
        <pre class="code-block" id="${id}">${escHtml(code)}</pre>
      </div>`;
    } else {
      // inline code
      let p = escHtml(part);
      p = p.replace(/`([^`]+)`/g,'<code>$1</code>');
      // bold
      p = p.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
      // italic
      p = p.replace(/\*([^*]+)\*/g,'<em>$1</em>');
      // newlines
      p = p.replace(/\n/g,"<br>");
      html += p;
    }
  });
  return html;
}

async function sendMessage(){
  const ta=document.getElementById("msg-ta");
  const text=ta.value.trim();
  if(!text||busy) return;
  busy=true;
  document.getElementById("send-btn").disabled=true;
  ensureActiveChat(text);
  chatHistory.push({role:"user",content:text});
  addUserMsg(text);
  ta.value=""; ta.style.height="auto";
  showTyping();

  const model=MODELS[curModel];

  try{
    const res = await fetch(GROQ_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+GROQ_KEY,
      },
      body:JSON.stringify({
        model:model.id,
        max_tokens:model.tokens,
        stream:true,
        messages:[
          {role:"system",content:SYSTEM_PROMPT},
          ...chatHistory
        ]
      })
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({error:{message:"HTTP "+res.status}}));
      throw new Error(err.error?.message||"HTTP "+res.status);
    }

    hideTyping();
    // Setup streaming bubble
    const inner=document.getElementById("msgs-inner");
    const row=document.createElement("div");
    row.className="msg-row ai";
    const bubId="sb"+Math.random().toString(36).slice(2,8);
    row.innerHTML=`
      <div class="msg-avatar-wrap"><div class="msg-av ai">C</div></div>
      <div class="msg-body">
        <div class="msg-name" style="color:var(--green)"><i class="fa-solid fa-circle" style="font-size:7px;margin-right:4px"></i>Crackus</div>
        <div class="msg-bubble" id="${bubId}"><span class="cursor"></span></div>
        <div class="msg-actions" id="acts${bubId}" style="display:none"></div>
      </div>`;
    inner.appendChild(row);
    scrollBottom(true);

    const bub=document.getElementById(bubId);
    const reader=res.body.getReader();
    const decoder=new TextDecoder();
    let full="";
    // Use a pre element for raw streaming — fast, no re-render
    const streamPre=document.createElement("pre");
    streamPre.style.cssText="white-space:pre-wrap;word-break:break-word;font-family:inherit;font-size:inherit;line-height:inherit;background:none;border:none;padding:0;margin:0";
    const textNode=document.createTextNode("");
    const cur2=document.createElement("span");
    cur2.className="cursor";
    streamPre.appendChild(textNode);
    streamPre.appendChild(cur2);
    bub.innerHTML="";
    bub.appendChild(streamPre);

    // Throttle scroll — only scroll every 80ms max
    let lastScroll=0;
    function throttleScroll(){
      const now=Date.now();
      if(now-lastScroll>80){lastScroll=now;scrollBottom(false);}
    }

    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      const chunk=decoder.decode(value,{stream:true});
      const lines=chunk.split("\n");
      for(const line of lines){
        if(!line.startsWith("data:")) continue;
        const d=line.slice(5).trim();
        if(d==="[DONE]") continue;
        try{
          const j=JSON.parse(d);
          const delta=j.choices?.[0]?.delta?.content||"";
          if(delta){full+=delta; textNode.nodeValue=full; throttleScroll();}
        }catch{}
      }
    }

    // Final full markdown render now that streaming is done
    bub.innerHTML=renderContent(full);
    const acts=document.getElementById("acts"+bubId);
    acts.style.display="flex";
    const smid="s"+Math.random().toString(36).slice(2,8);
    msgStore[smid]=full;
    acts.innerHTML=`
      <button class="action-btn" onclick="copyMsg('${smid}',this)"><i class="fa-regular fa-copy"></i> Copy</button>
      <button class="action-btn" onclick="this.closest('.msg-row').remove()"><i class="fa-regular fa-trash-can"></i> Delete</button>`;
    chatHistory.push({role:"assistant",content:full});
    saveChat();
    scrollBottom(true);

  } catch(err){
    hideTyping();
    let errText = err.message;
    // Friendly messages for common issues
    if(errText.includes("Failed to fetch")||errText.includes("NetworkError")||errText.includes("Load failed")){
      errText = "⚠️ Network error — unable to reach Groq API. This can happen due to browser CORS restrictions when opening the file directly.\n\n**Fix:** Serve this file via a local server:\n```bash\nnpx serve .\n# or\npython3 -m http.server 8080\n```\nThen open http://localhost:8080";
    } else if(errText.includes("401")){
      errText = "⚠️ Invalid API key. Please update the GROQ_KEY in the script.";
    } else if(errText.includes("429")){
      errText = "⚠️ Rate limit hit. Wait a moment and try again.";
    } else if(errText.includes("model")){
      errText = "⚠️ Model error: "+errText+"\n\nTry switching to a different model.";
    }
    addAIMsg(errText);
    saveChat();
  }

  busy=false;
  const ta2=document.getElementById("msg-ta");
  document.getElementById("send-btn").disabled=!ta2.value.trim();
}

// Init
document.getElementById("msgs-wrap").style.display="none";
